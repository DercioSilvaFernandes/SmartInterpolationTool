<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Interpolation Visualizer</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>SmartInterpolationTool Visualizer</h1>
    <p>Select motions and play the interpolated robot animation.</p>
  </header>

  <main>
    <section class="controls">
      <div class="row">
        <label for="robotType">Robot type</label>
        <select id="robotType"></select>
      </div>
      <div class="row">
        <label for="standSelect">Stand motion</label>
        <select id="standSelect"></select>
        <input type="file" id="standUpload" accept=".csv" />
      </div>
      <div class="row">
        <label for="motionASelect">Motion A</label>
        <select id="motionASelect"></select>
        <input type="file" id="motionAUpload" accept=".csv" />
      </div>
      <div class="row">
        <label for="motionBSelect">Motion B (optional)</label>
        <select id="motionBSelect"></select>
        <input type="file" id="motionBUpload" accept=".csv" />
      </div>
      <div class="row">
        <label>Extra clips</label>
        <button id="addClipButton" type="button">+ Add clip</button>
      </div>
      <div id="clipList"></div>
      <div class="row">
        <label for="steps">Interpolation steps</label>
        <input id="steps" type="number" value="60" min="2" />
      </div>
      <div class="row">
        <label for="hold">Hold frames</label>
        <input id="hold" type="number" value="20" min="0" />
      </div>
      <div class="row">
        <label for="easing">Easing</label>
        <select id="easing">
          <option value="minimum_jerk" selected>Minimum jerk</option>
          <option value="smoothstep">Smoothstep</option>
          <option value="linear">Linear</option>
        </select>
      </div>
      <div class="row">
        <label for="playbackSpeed">Playback speed</label>
        <input id="playbackSpeed" type="range" min="0.1" max="2" step="0.05" value="1" />
        <span id="playbackSpeedLabel">1.0×</span>
      </div>
      <div class="row">
        <button id="buildButton">Generate &amp; Play</button>
        <button id="downloadButton" disabled>Download CSV</button>
        <button id="recordButton" disabled>Record Video</button>
      </div>
      <div class="row">
        <label>Playback</label>
        <button id="playPauseButton" disabled>Play</button>
        <input id="frameScrub" type="range" min="1" value="1" />
        <span id="frameLabel">—</span>
      </div>
    </section>

    <section class="viewer">
      <div id="canvasContainer"></div>
    </section>

    <section class="notes">
      <p><strong>Notes:</strong> The viewer uses the same URDF files from <code>lafan1_retargeting_dataset/robot_description</code>. If you upload a CSV, it will be used in preference to the dropdown selection.</p>
    </section>
  </main>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
